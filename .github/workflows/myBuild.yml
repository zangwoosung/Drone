name: Unity Windows Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build for Windows Standalone
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Free disk space & memory
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          df -h

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Windows-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-Windows-
            Library-

      - name: Build Unity project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: StandaloneWindows64
          buildName: MyUnityGame
          buildsPath: build
          # ---------------------------------------------------------------
          # IMPORTANT: Set your exact Unity version here.
          # Then verify the image exists at:
          # https://hub.docker.com/r/unityci/editor/tags?name=6000.4
          #
          # If 6000.4.3f1 has NO image yet, use the closest available version
          # shown on Docker Hub (e.g. 6000.0.39f1).
          #
          # Also note: newer GameCI images drop the "ubuntu-" prefix.
          # game-ci/unity-builder@v4 handles this automatically when you
          # set unityVersion correctly below.
          # ---------------------------------------------------------------
          unityVersion: 6000.0.39f1   # <-- Change to your version (check Docker Hub first!)
          customParameters: >
            -disable-gpu-skinning
            -batchmode
            -nographics
            -quit

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Build
          path: build/StandaloneWindows64
          retention-days: 14
